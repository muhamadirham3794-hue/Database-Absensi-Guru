<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Presensi Guru</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-100 font-sans">

  <div id="login-page" class="flex h-screen items-center justify-center">
    <div class="w-full max-w-md bg-white p-8 rounded-lg shadow-md">
      <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Login E-Absen Guru</h2>
      <div class="mb-4">
        <label class="block text-gray-700 font-semibold mb-1">Username</label>
        <input type="text" id="username" class="w-full px-3 py-2 border rounded-lg text-black">
      </div>
      <div class="mb-6">
        <label class="block text-gray-700 font-semibold mb-1">Password</label>
        <input type="password" id="password" class="w-full px-3 py-2 border rounded-lg text-black">
      </div>
      <button onclick="eksekusiLogin()" id="btn-login" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 font-bold">Masuk</button>
    </div>
  </div>

  <div id="main-app" class="hidden min-h-screen flex flex-col">
    <nav class="bg-blue-600 text-white p-4 flex justify-between items-center shadow-md">
      <h1 class="text-xl font-bold">E-Absen (<span id="user-role">Guru</span>)</h1>
      <button onclick="location.reload()" class="bg-red-500 px-4 py-2 rounded font-bold">Keluar</button>
    </nav>

    <div class="flex flex-1 flex-col md:flex-row">
      <aside class="w-full md:w-64 bg-white shadow-md p-4 space-y-2">
        <div id="menu-admin" class="hidden space-y-2">
          <button onclick="gantiTab('scan')" class="w-full text-left p-3 hover:bg-blue-50 rounded">📷 Scan QR & Manual</button>
          <button onclick="gantiTab('laporan')" class="w-full text-left p-3 hover:bg-blue-50 rounded">📊 Laporan Presensi</button>
          <button onclick="gantiTab('input-guru')" class="w-full text-left p-3 hover:bg-blue-50 rounded">👤 Input Data Guru</button>
          <button onclick="gantiTab('grafik')" class="w-full text-left p-3 hover:bg-blue-50 rounded">📈 Grafik Statistik</button>
        </div>
        <div id="menu-kepsek" class="hidden space-y-2">
          <button onclick="gantiTab('monitoring')" class="w-full text-left p-3 hover:bg-green-50 rounded text-green-700">👁️ Real-time Monitoring</button>
          <button onclick="gantiTab('grafik')" class="w-full text-left p-3 hover:bg-green-50 rounded text-green-700">📈 Lihat Grafik Sekolah</button>
        </div>
      </aside>

      <main class="flex-1 p-6">
        <section id="tab-scan" class="tab-content hidden space-y-6">
          <div class="bg-white p-6 rounded-lg shadow"><div id="reader" class="mx-auto" style="width:300px;"></div></div>
          <div class="bg-white p-6 rounded-lg shadow">
            <h3 class="text-lg font-bold mb-3">Input Manual NIP</h3>
            <div class="flex gap-2">
              <input type="text" id="manual-nip" placeholder="Masukkan NIP" class="border p-2 rounded text-black flex-1">
              <button onclick="kirimAbsensi('absen_masuk')" class="bg-green-600 text-white px-4 py-2 rounded">Masuk</button>
              <button onclick="kirimAbsensi('absen_keluar')" class="bg-yellow-600 text-white px-4 py-2 rounded">Keluar</button>
            </div>
          </div>
        </section>

        <section id="tab-laporan" class="tab-content hidden bg-white p-6 rounded-lg shadow">
          <table class="w-full text-center border">
            <thead><tr class="bg-gray-100"><th>NIP</th><th>Nama</th><th>Tanggal</th><th>Masuk</th><th>Keluar</th><th>Status</th></tr></thead>
            <tbody id="tabel-body"></tbody>
          </table>
        </section>

        <section id="tab-grafik" class="tab-content hidden bg-white p-6 rounded-lg shadow">
          <div style="max-width:300px;" class="mx-auto"><canvas id="chartKehadiran"></canvas></div>
        </section>

        <section id="tab-input-guru" class="tab-content hidden bg-white p-6 rounded-lg shadow space-y-3 max-w-sm">
          <input type="text" id="g-nip" placeholder="NIP" class="w-full border p-2 rounded text-black">
          <input type="text" id="g-nama" placeholder="Nama" class="w-full border p-2 rounded text-black">
          <input type="text" id="g-jabatan" placeholder="Jabatan" class="w-full border p-2 rounded text-black">
          <button onclick="simpanGuru()" class="bg-blue-600 text-white w-full py-2 rounded shadow">Simpan Guru</button>
        </section>

        <section id="tab-monitoring" class="tab-content hidden space-y-4">
          <div class="grid grid-cols-3 gap-4 text-center">
            <div class="bg-green-100 p-3 rounded"><h5>Total Guru</h5><p id="m-total" class="text-xl font-bold">0</p></div>
            <div class="bg-blue-100 p-3 rounded"><h5>Hadir</h5><p id="m-hadir" class="text-xl font-bold">0</p></div>
            <div class="bg-red-100 p-3 rounded"><h5>Telat</h5><p id="m-telat" class="text-xl font-bold">0</p></div>
          </div>
          <div class="bg-white p-4 rounded shadow">
            <table class="w-full text-center border">
              <thead><tr class="bg-gray-50"><th>Nama Guru</th><th>Jam Masuk</th><th>Status</th></tr></thead>
              <tbody id="live-body"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script>
    // ⚠️ PASTE URL SCRIPT GOOGLE KAMU DI SINI
    const API_URL = "https://script.google.com/macros/s/AKfycbxGBZ4O-_uM--BxqaNfTZc9ezUw5MzvtX7bB7NpeD38Ms_BH68AbKVek8Q-O8b6QHNEog/exec"; 

    let user = null;
    let chartInstance = null;
    let qrScanner = null;

    // TRIK SAKTI: Mengirim JSON sebagai TEXT biasa lewat "text/plain" bypass pemeriksaan CORS preflight browser
    async function postData(payload) {
      const response = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain; charset=utf-8" },
        body: JSON.stringify(payload)
      });
      return response.json();
    }

    async function eksekusiLogin() {
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;
      if(!u || !p) return alert("Harap isi semua bidang!");
      
      document.getElementById('btn-login').innerText = "Memproses...";
      try {
        const res = await postData({ action: "login", username: u, password: p });
        if(res.status === "success") {
          user = res;
          document.getElementById('login-page').classList.add('hidden');
          document.getElementById('main-app').classList.remove('hidden');
          document.getElementById('user-role').innerText = user.nama;
          
          if(user.role === 'admin') {
            document.getElementById('menu-admin').classList.remove('hidden');
            gantiTab('scan');
          } else {
            document.getElementById('menu-kepsek').classList.remove('hidden');
            gantiTab('monitoring');
          }
        } else { alert(res.message); }
      } catch(e) {
        alert("Koneksi gagal. Cek kembali URL Deployment script Anda!");
      } finally { document.getElementById('btn-login').innerText = "Masuk"; }
    }

    function gantiTab(id) {
      document.querySelectorAll('.tab-content').forEach(e => e.classList.add('hidden'));
      document.getElementById('tab-' + id).classList.remove('hidden');
      if(id !== 'scan' && qrScanner) { try { qrScanner.clear(); }catch(e){} }
      
      if(id === 'scan') jalankanScanner();
      if(id === 'laporan') muatLaporan();
      if(id === 'grafik') muatGrafik();
      if(id === 'monitoring') muatMonitoring();
    }

    function jalankanScanner() {
      if(!qrScanner) qrScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 200 });
      qrScanner.render(async (text) => {
        try{ await qrScanner.clear(); }catch(e){}
        const res = await postData({ action: "absen_masuk", nip: text, metode: "QR" });
        alert(res.message);
        gantiTab('scan');
      }, () => {});
    }

    async function kirimAbsensi(act) {
      const nip = document.getElementById('manual-nip').value;
      if(!nip) return alert("NIP kosong!");
      const res = await postData({ action: act, nip: nip, metode: "Manual" });
      alert(res.message);
      document.getElementById('manual-nip').value = "";
    }

    async function muatLaporan() {
      const b = document.getElementById('tabel-body');
      b.innerHTML = "<tr><td colspan='6' class='p-3'>Memuat data...</td></tr>";
      const r = await fetch(`${API_URL}?action=get_laporan`);
      const data = await r.json();
      b.innerHTML = "";
      data.forEach(x => {
        b.innerHTML += `<tr class="border-b"><td>${x.nip}</td><td>${x.nama_guru}</td><td>${x.tanggal}</td><td class="text-green-600 font-bold">${x.jam_masuk}</td><td class="text-red-600 font-bold">${x.jam_keluar}</td><td>${x.status_kehadiran}</td></tr>`;
      });
    }

    async function muatGrafik() {
      const r = await fetch(`${API_URL}?action=get_dashboard_stats`);
      const s = await r.json();
      const ctx = document.getElementById('chartKehadiran').getContext('2d');
      if(chartInstance) chartInstance.destroy();
      chartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['Hadir', 'Telat', 'Belum Absen'],
          datasets: [{ data: [s.hadir, s.terlambat, Math.max(0, s.totalGuru - s.hadir - s.terlambat)], backgroundColor: ['#10B981', '#F59E0B', '#EF4444'] }]
        }
      });
    }

    async function simpanGuru() {
      const n = document.getElementById('g-nip').value;
      const nm = document.getElementById('g-nama').value;
      const jb = document.getElementById('g-jabatan').value;
      const res = await postData({ action: "tambah_guru", nip: n, nama: nm, jabatan: jb });
      alert(res.message);
      document.getElementById('g-nip').value = ""; document.getElementById('g-nama').value = ""; document.getElementById('g-jabatan').value = "";
    }

    async function muatMonitoring() {
      const r1 = await fetch(`${API_URL}?action=get_dashboard_stats`);
      const s = await r1.json();
      document.getElementById('m-total').innerText = s.totalGuru;
      document.getElementById('m-hadir').innerText = s.hadir;
      document.getElementById('m-telat').innerText = s.terlambat;

      const r2 = await fetch(`${API_URL}?action=get_laporan`);
      const l = await r2.json();
      const b = document.getElementById('live-body');
      b.innerHTML = "";
      const tgl = new Date().toLocaleDateString('sv-SE', { timeZone: 'Asia/Jakarta' });
      l.filter(x => x.tanggal === tgl).forEach(x => {
        b.innerHTML += `<tr><td>${x.nama_guru}</td><td>${x.jam_masuk}</td><td>${x.status_kehadiran}</td></tr>`;
      });
    }
    // Gunakan fungsi pengiriman ini di index.html kamu
async function postData(payload) {
  const response = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain; charset=utf-8" },
    body: JSON.stringify(payload)
  });
  return response.json();
}
  </script>
</body>
</html>
